name: Temporary P0 soil no-fail relax verification

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify:
    if: github.head_ref == 'p0-soil-no-fail-relax-01' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p0-soil-no-fail-relax-01
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Apply P0 patch and run full test suite
        run: |
          node scripts/p0-soil-no-fail-relax.mjs
          npm test
      - name: Commit verified P0 implementation
        run: |
          rm -f scripts/p0-soil-no-fail-relax.mjs scripts/p0-soil-no-fail-relax-fix.mjs
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add elementera-mcp/deploy-pages/public/features/chat.js functions/memory-router.js tests/memory.test.mjs scripts
          git commit -m "P0-SOIL-NO-FAIL-RELAX-01: relax soil organize failure handling"
          git push origin HEAD:p0-soil-no-fail-relax-01
