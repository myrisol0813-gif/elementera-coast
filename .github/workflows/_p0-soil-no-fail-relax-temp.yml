name: Temporary P0 soil no-fail relax verification

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify:
    if: github.head_ref == 'p0-soil-no-fail-relax-01' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p0-soil-no-fail-relax-01
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Apply P0 patch and persist verification output
        run: |
          set +e
          node scripts/p0-soil-no-fail-relax.mjs > /tmp/p0-soil-patch.log 2>&1
          PATCH_STATUS=$?
          TEST_STATUS=999
          if [ "$PATCH_STATUS" -eq 0 ]; then
            npm test > /tmp/p0-soil-test.log 2>&1
            TEST_STATUS=$?
          else
            : > /tmp/p0-soil-test.log
          fi
          {
            echo "PATCH_STATUS=$PATCH_STATUS"
            echo "TEST_STATUS=$TEST_STATUS"
            echo "--- PATCH LOG ---"
            cat /tmp/p0-soil-patch.log
            echo "--- TEST LOG TAIL ---"
            tail -240 /tmp/p0-soil-test.log
          } > P0_SOIL_RELAX_DEBUG.log
          rm -f scripts/p0-soil-no-fail-relax.mjs scripts/p0-soil-no-fail-relax-fix.mjs
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add elementera-mcp/deploy-pages/public/features/chat.js functions/memory-router.js tests/memory.test.mjs scripts P0_SOIL_RELAX_DEBUG.log
          git commit -m "debug: persist P0 soil relax verification output" || true
          git push origin HEAD:p0-soil-no-fail-relax-01 || true
