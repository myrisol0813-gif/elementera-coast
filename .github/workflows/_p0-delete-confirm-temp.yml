name: Temporary P0 delete confirm verification

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify:
    if: github.head_ref == 'p0-delete-confirm-01' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p0-delete-confirm-01
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: node scripts/p0-delete-confirm-01.mjs
      - name: Run full test suite and preserve a failure tail
        run: |
          set +e
          npm test 2>&1 | tee /tmp/p0-test.log
          STATUS=${PIPESTATUS[0]}
          set -e
          if [ "$STATUS" -ne 0 ]; then
            tail -n 180 /tmp/p0-test.log > P0_TEST_LOG.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add P0_TEST_LOG.txt
            git commit -m "test: capture P0 delete confirm failure"
            git push origin HEAD:p0-delete-confirm-01
            exit "$STATUS"
          fi
      - name: Commit verified DOM coverage and remove branch-only helpers
        run: |
          rm -f P0_TEST_LOG.txt
          rm scripts/p0-delete-confirm-01.mjs
          rm -f .github/workflows/p0-delete-confirm-verify.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: verify destructive action confirmations"
          git push origin HEAD:p0-delete-confirm-01
