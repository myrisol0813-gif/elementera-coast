name: Temporary P1 soil candidate guard verification

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify:
    if: github.head_ref == 'p1-soil-note-freedom-guard-fix' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p1-soil-note-freedom-guard-fix
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - name: Apply guard fix and run full test suite
        run: |
          set +e
          node scripts/p1-soil-note-freedom-guard-fix.mjs > /tmp/p1-guard-patch.log 2>&1
          PATCH_STATUS=$?
          if [ "$PATCH_STATUS" -eq 0 ]; then
            npm test > /tmp/p1-guard-test.log 2>&1
            TEST_STATUS=$?
          else
            TEST_STATUS=0
          fi
          set -e
          cat /tmp/p1-guard-patch.log
          if [ -f /tmp/p1-guard-test.log ]; then cat /tmp/p1-guard-test.log; fi
          if [ "$PATCH_STATUS" -ne 0 ] || [ "$TEST_STATUS" -ne 0 ]; then
            {
              echo '=== PATCH ==='
              cat /tmp/p1-guard-patch.log
              echo '=== TEST ==='
              if [ -f /tmp/p1-guard-test.log ]; then cat /tmp/p1-guard-test.log; fi
            } > P1_GUARD_TEST_LOG.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add P1_GUARD_TEST_LOG.txt
            git commit -m "test: capture soil candidate guard failure"
            git push origin HEAD:p1-soil-note-freedom-guard-fix
            exit 1
          fi
      - name: Commit verified guard fix
        run: |
          rm -f P1_GUARD_TEST_LOG.txt
          rm scripts/p1-soil-note-freedom-guard-fix.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: verify soil candidate empty guard"
          git push origin HEAD:p1-soil-note-freedom-guard-fix
