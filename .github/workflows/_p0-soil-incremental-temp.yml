name: Temporary P0 soil incremental verification

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify:
    if: github.head_ref == 'p0-soil-incremental-bridge-01' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p0-soil-incremental-bridge-01
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Apply P0 implementation and run full test suite
        run: |
          node scripts/p0-soil-incremental-bridge.mjs
          npm test
      - name: Commit verified P0 implementation
        run: |
          rm -f scripts/p0-soil-incremental-bridge.mjs
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add functions/memory-store.js functions/memory-router.js package.json tests/soil-incremental.test.mjs scripts
          git commit -m "P0-SOIL-INCREMENTAL-BRIDGE-01: use incremental thought soil context"
          git push origin HEAD:p0-soil-incremental-bridge-01
