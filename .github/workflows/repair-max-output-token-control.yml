name: Finalize configurable output token control

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  repair-and-verify:
    if: github.head_ref == 'feature/max-output-token-control' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/max-output-token-control
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update DOM expectations for the new control
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('tests/dom.test.mjs')
          text = path.read_text(encoding='utf-8')

          old_label = "'上下文预算（粗略）', '自然', '不设置应用层输出上限', '思维壤预算'"
          new_label = "'上下文预算（粗略）', '自然', '最大输出 token', '思维壤预算'"
          if text.count(old_label) != 1:
              raise SystemExit(f'old run-control label count: {text.count(old_label)}')
          text = text.replace(old_label, new_label)

          old_controls = "for (const [name, value] of [\n  ['seedCooldownTurns', '0'],"
          new_controls = "for (const [name, value] of [\n  ['maxOutputTokens', '4096'],\n  ['seedCooldownTurns', '0'],"
          if text.count(old_controls) != 1:
              raise SystemExit(f'run-control test list count: {text.count(old_controls)}')
          text = text.replace(old_controls, new_controls)

          path.write_text(text, encoding='utf-8')
          PY

      - run: npm install --ignore-scripts

      - name: Run full tests and commit result
        shell: bash
        run: |
          set +e
          npm test > TOKEN_CONTROL_TEST_LOG.txt 2>&1
          TEST_STATUS=$?
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/token-control-dom-trigger
          if [ "$TEST_STATUS" -eq 0 ]; then
            rm -f TOKEN_CONTROL_TEST_LOG.txt
            git add tests/dom.test.mjs TOKEN_CONTROL_TEST_LOG.txt .github/token-control-dom-trigger
            git commit -m "test: cover configurable output token control"
          else
            git add -f tests/dom.test.mjs TOKEN_CONTROL_TEST_LOG.txt .github/token-control-dom-trigger
            git commit -m "debug: preserve DOM token control failure"
          fi
          git push origin HEAD:feature/max-output-token-control
          exit "$TEST_STATUS"
