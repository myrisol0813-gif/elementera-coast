name: P3 chat trace stream verify

on:
  push:
    branches:
      - p3-chat-trace-stream-01
    paths-ignore:
      - .p3-test-result.json

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply final exact test prep
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          chat = Path('elementera-mcp/deploy-pages/public/features/chat.js')
          text = chat.read_text()
          old = "content: streamingEnabled ? partialContent : (cancelled ? '' : '消息生成失败，请稍后重试。'),"
          new = "content: streamingEnabled ? partialContent : (cancelled ? '已停止生成。' : '消息生成失败，请稍后重试。'),"
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit('chat cancel path replacement target missing')
          chat.write_text(text)

          streaming = Path('tests/streaming.test.mjs')
          text = streaming.read_text()
          replacements = {
              "document.querySelector('.assistant-text')?.textContent.includes('半截保留')": "[...document.querySelectorAll('.assistant-text')].at(-1)?.textContent.includes('半截保留')",
              "document.querySelector('.assistant-text')?.textContent.includes('json: 关闭流式')": "[...document.querySelectorAll('.assistant-text')].at(-1)?.textContent.includes('json: 关闭流式')",
          }
          for old, new in replacements.items():
              if old in text:
                  text = text.replace(old, new, 1)
              elif new not in text:
                  raise SystemExit(f'streaming selector replacement target missing: {old}')
          streaming.write_text(text)

          provenance = Path('tests/provenance.test.mjs')
          text = provenance.read_text()
          import_old = "import { createMemory } from '../elementera-mcp/deploy-pages/public/features/memory.js';"
          import_new = import_old + "\nimport { createConversation, getConversation, setGeneratedTitle } from '../functions/chat-store.js';"
          if import_new not in text:
              if import_old not in text:
                  raise SystemExit('provenance import target missing')
              text = text.replace(import_old, import_new, 1)
          marker = "assert.equal((await readGenerationProvenance(db, 'pocket', 'pocket-incomplete')).usage, null, 'incomplete usage must never become displayed token metadata');"
          title_test = marker + "\n\nconst titleDb = new D1Database();\nconst titledConversation = await createConversation(titleDb, '新聊天');\nawait setGeneratedTitle(titleDb, titledConversation.id, '潮线', 'openai/gpt-4.1-nano');\nassert.equal((await getConversation(titleDb, titledConversation.id)).title_model_id, 'openai/gpt-4.1-nano', 'generated title model provenance must persist');"
          if title_test not in text:
              if marker not in text:
                  raise SystemExit('title provenance insertion target missing')
              text = text.replace(marker, title_test, 1)
          provenance.write_text(text)

          package = Path('package.json')
          value = json.loads(package.read_text())
          value['scripts']['test'] = 'node tests/chat-state.test.mjs && node tests/backend.test.mjs && node tests/storage.test.mjs && node tests/architecture.test.mjs && node tests/memory.test.mjs && node tests/provenance.test.mjs && node tests/streaming.test.mjs && node tests/dom.test.mjs'
          package.write_text(json.dumps(value, ensure_ascii=False, indent=2) + '\n')
          PY
          if ! git diff --quiet; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add elementera-mcp/deploy-pages/public/features/chat.js tests/streaming.test.mjs tests/provenance.test.mjs package.json
            git commit -m "fix: preserve JSON cancel path and wire streaming tests [skip ci]"
            git push
          fi
      - name: Run npm ci and npm test, then publish evidence
        shell: bash
        run: |
          set +e
          TESTED_SHA=$(git rev-parse HEAD)
          npm ci > /tmp/p3-npm-ci.log 2>&1
          CI_EXIT=$?
          TEST_EXIT=99
          if [ "$CI_EXIT" -eq 0 ]; then
            npm test > /tmp/p3-npm-test.log 2>&1
            TEST_EXIT=$?
          else
            : > /tmp/p3-npm-test.log
          fi
          export TESTED_SHA CI_EXIT TEST_EXIT
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const clip = (path) => fs.readFileSync(path, 'utf8').slice(-50000);
          const ciExit = Number(process.env.CI_EXIT);
          const testExit = Number(process.env.TEST_EXIT);
          const result = {
            trigger_sha: process.env.GITHUB_SHA,
            tested_sha: process.env.TESTED_SHA,
            npm_ci_exit: ciExit,
            npm_test_exit: testExit,
            ok: ciExit === 0 && testExit === 0,
            npm_ci_output: clip('/tmp/p3-npm-ci.log'),
            npm_test_output: clip('/tmp/p3-npm-test.log'),
          };
          fs.writeFileSync('.p3-test-result.json', `${JSON.stringify(result, null, 2)}\n`);
          NODE
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .p3-test-result.json
          git commit -m "test: publish p3 verification result" || true
          git push
          if [ "$CI_EXIT" -ne 0 ]; then exit "$CI_EXIT"; fi
          exit "$TEST_EXIT"
