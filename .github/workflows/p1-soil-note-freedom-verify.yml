name: P1 soil note freedom verify

on:
  push:
    branches:
      - p1-soil-note-freedom-01

permissions:
  contents: write

jobs:
  verify:
    if: github.event.head_commit.message != 'test: verify soil note freedom' && github.event.head_commit.message != 'test: capture P1 soil note freedom failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p1-soil-note-freedom-01
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - name: Apply patch and run full test suite
        run: |
          set +e
          node scripts/p1-soil-note-freedom-01.mjs > /tmp/p1-patch.log 2>&1
          PATCH_STATUS=$?
          if [ "$PATCH_STATUS" -eq 0 ]; then
            npm test > /tmp/p1-test.log 2>&1
            TEST_STATUS=$?
          else
            TEST_STATUS=0
          fi
          set -e
          cat /tmp/p1-patch.log
          if [ -f /tmp/p1-test.log ]; then cat /tmp/p1-test.log; fi
          if [ "$PATCH_STATUS" -ne 0 ] || [ "$TEST_STATUS" -ne 0 ]; then
            {
              echo '=== PATCH ==='
              cat /tmp/p1-patch.log
              echo '=== TEST ==='
              if [ -f /tmp/p1-test.log ]; then cat /tmp/p1-test.log; fi
            } > P1_TEST_LOG.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add P1_TEST_LOG.txt
            git commit -m "test: capture P1 soil note freedom failure"
            git push origin HEAD:p1-soil-note-freedom-01
            exit 1
          fi
      - name: Commit verified implementation
        run: |
          rm -f P1_TEST_LOG.txt
          rm scripts/p1-soil-note-freedom-01.mjs
          rm .github/workflows/p1-soil-note-freedom-verify.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: verify soil note freedom"
          git push origin HEAD:p1-soil-note-freedom-01
