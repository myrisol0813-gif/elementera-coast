name: P0 delete confirm verify

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p0-delete-confirm-01
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: node scripts/p0-delete-confirm-01.mjs
      - run: npm test
      - name: Commit verified test coverage and remove temporary CI helpers
        run: |
          rm scripts/p0-delete-confirm-01.mjs
          rm .github/workflows/p0-delete-confirm-verify.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: verify destructive action confirmations"
          git push origin HEAD:p0-delete-confirm-01
