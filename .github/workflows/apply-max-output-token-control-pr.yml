name: Verify configurable output token control

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feature/max-output-token-control' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/max-output-token-control
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Patch token controls and credit diagnostics
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_exact(path, old, new, expected=1):
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              count = text.count(old)
              if count != expected:
                  raise SystemExit(f'{path}: expected {expected} matches, found {count}')
              file.write_text(text.replace(old, new), encoding='utf-8')

          def replace_all(path, old, new):
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              count = text.count(old)
              if count < 1:
                  raise SystemExit(f'{path}: missing {old!r}')
              file.write_text(text.replace(old, new), encoding='utf-8')

          replace_exact('elementera-mcp/deploy-pages/public/core/storage.js', "      outputLength: 'auto',\n      creativity: 'balanced',", "      outputLength: 'auto',\n      maxOutputTokens: 8000,\n      creativity: 'balanced',")
          replace_exact('elementera-mcp/deploy-pages/public/features/tools.js', "${group('输出偏好', choiceRow('outputLength', '回答长度', '“自然”和“长信”不设置应用层输出上限，由模型自行判断何时结束；“偏短”限制为 700。') + choiceRow('creativity', '表达倾向'))}", "${group('输出偏好', choiceRow('outputLength', '回答长度', '“偏短”最多 700 tokens；“自然”和“长信”使用下方上限。') + numberRow('maxOutputTokens', '最大输出 token', 64, 65536, 64, '这是单次回复允许生成的最高值，不代表每次一定用满。余额较少时可调低；自动标题固定为 40，不受此项影响。') + choiceRow('creativity', '表达倾向'))}")
          replace_exact('elementera-mcp/deploy-pages/public/features/tools.js', "      'recentTurns', 'contextBudget', 'soilBudget', 'autoRefreshEveryTurns', 'maxHandSeeds',", "      'recentTurns', 'contextBudget', 'maxOutputTokens', 'soilBudget', 'autoRefreshEveryTurns', 'maxHandSeeds',")

          replace_exact('functions/models.js', "export const MAX_FORMAL_TOKENS = 3200;\nconst MAX_SANDBOX_TOKENS = 700;", "export const MAX_FORMAL_TOKENS = 65536;\nconst DEFAULT_FORMAL_TOKENS = 8000;\nconst MAX_SANDBOX_TOKENS = 700;")
          replace_exact('functions/models.js', "function compact(value, max = 160) {\n  return String(value || '').replace(/\\s+/g, ' ').trim().slice(0, max);\n}\n\nasync function providerError(response) {", "function compact(value, max = 160) {\n  return String(value || '').replace(/\\s+/g, ' ').trim().slice(0, max);\n}\n\nfunction creditTokenShortfall(preview = '') {\n  const match = String(preview).match(/requested up to\\s+([\\d,]+)\\s+tokens?,\\s+but can only afford\\s+([\\d,]+)/i);\n  if (!match) return null;\n  const requested = Number(match[1].replace(/,/g, ''));\n  const affordable = Number(match[2].replace(/,/g, ''));\n  if (!Number.isFinite(requested) || !Number.isFinite(affordable)) return null;\n  return { requested: Math.trunc(requested), affordable: Math.trunc(affordable), missing: Math.max(0, Math.trunc(requested - affordable)) };\n}\n\nasync function providerError(response) {")
          replace_exact('functions/models.js', "  if (status === 402) return ['insufficient_credits', 'OpenRouter 余额或 credits 不足。'];", "  if (status === 402) {\n    const credit = creditTokenShortfall(preview);\n    if (credit) return ['insufficient_credits', `OpenRouter 额度预检未通过：本次最大输出设为 ${credit.requested} tokens，当前余额最多负担 ${credit.affordable}，还差 ${credit.missing} tokens。请在 API 小屋把“最大输出 token”调到 ${credit.affordable} 或更低。`];\n    return ['insufficient_credits', 'OpenRouter 余额或 credits 不足。可以在 API 小屋调低“最大输出 token”。'];\n  }")
          replace_exact('functions/models.js', "  const requestedMaxTokens = Object.prototype.hasOwnProperty.call(settings, 'max_tokens')\n    ? settings.max_tokens\n    : input.max_tokens;\n  const maxTokens = requestedMaxTokens === null\n    ? null\n    : clamp(requestedMaxTokens, 600, 1, MAX_FORMAL_TOKENS);", "  const configuredMaxTokens = clamp(settings.maxOutputTokens, DEFAULT_FORMAL_TOKENS, 64, MAX_FORMAL_TOKENS);\n  const explicitMaxTokens = Object.prototype.hasOwnProperty.call(settings, 'max_tokens')\n    ? settings.max_tokens\n    : input.max_tokens;\n  const requestedMaxTokens = explicitMaxTokens === null\n    ? configuredMaxTokens\n    : explicitMaxTokens === undefined\n      ? (Number.isFinite(Number(settings.maxOutputTokens)) ? configuredMaxTokens : 600)\n      : explicitMaxTokens;\n  const maxTokens = clamp(requestedMaxTokens, 600, 1, MAX_FORMAL_TOKENS);")

          replace_exact('tests/backend.test.mjs', "assert.equal(nonStreaming.finish_reason, 'stop');\n\nlet streamingPayload = null;", "assert.equal(nonStreaming.finish_reason, 'stop');\n\nawait performFormalChat(modelEnv, {\n  model: 'openai/gpt-4.1-nano',\n  messages: [{ role: 'user', content: 'configured output ceiling' }],\n  settings: { max_tokens: null, maxOutputTokens: 1234, temperature: 0.2 },\n});\nassert.equal(nonStreamingPayload.max_completion_tokens, 1234, 'configured output ceiling must be sent to OpenRouter');\n\nlet streamingPayload = null;")

          replace_all('elementera-mcp/deploy-pages/index.html', 'coast-app-08', 'coast-app-09')
          replace_all('elementera-mcp/deploy-pages/service-worker.js', 'coast-app-08', 'coast-app-09')
          replace_all('tests/architecture.test.mjs', 'coast-app-08', 'coast-app-09')
          replace_exact('tests/architecture.test.mjs', "'上下文预算（粗略）', '不设置应用层输出上限', '思维壤预算'", "'上下文预算（粗略）', '最大输出 token', '思维壤预算'")
          PY

      - run: npm install --ignore-scripts
      - run: npm test

      - name: Commit verified feature
        shell: bash
        run: |
          rm -f .github/token-control-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add functions elementera-mcp/deploy-pages tests .github/token-control-trigger
          git commit -m "feat: add configurable output token ceiling"
          git push origin HEAD:feature/max-output-token-control
