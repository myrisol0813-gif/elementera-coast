<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>Elementera Coast Cleanroom Shell</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fff;
      --panel: #f1f1f1;
      --panel-2: #f4f4f4;
      --side: #f9f9f9;
      --text: #171717;
      --muted: #8a8a8a;
      --line: rgba(0, 0, 0, 0.11);
      --user: #f1f1f1;
      --call: #ff6a21;
      --top: 52px;
      --composer-h: 62px;
      --pill-h: 42px;
      --input-h: 22px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    html,
    body { width: 100%; height: 100%; margin: 0; background: var(--bg); }
    body { overflow: hidden; color: var(--text); -webkit-font-smoothing: antialiased; }
    [hidden] { display: none !important; }
    button,
    textarea,
    input { font: inherit; }
    button { border: 0; background: transparent; color: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    textarea,
    input { border: 0; outline: 0; }
    .cr-shell,
    .cr-main { width: 100vw; min-height: 100dvh; background: var(--bg); overflow: hidden; }
    .cr-topbar {
      position: fixed;
      left: 0;
      right: 0;
      top: 0;
      z-index: 30;
      height: calc(var(--top) + env(safe-area-inset-top, 0px));
      padding: env(safe-area-inset-top, 0px) 8px 0;
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) 86px;
      align-items: center;
      background: var(--bg);
      border-bottom: 1px solid var(--line);
    }
    .cr-model-button {
      justify-self: start;
      display: flex;
      align-items: baseline;
      gap: 6px;
      min-width: 0;
      margin-left: 6px;
      padding: 6px 7px;
      border-radius: 12px;
      font-size: 17px;
      letter-spacing: -0.035em;
      white-space: nowrap;
    }
    .cr-model-title { font-weight: 470; color: var(--text); }
    .cr-model-name { font-weight: 450; color: var(--muted); opacity: 0.96; }
    .cr-actions { display: flex; justify-content: flex-end; gap: 3px; }
    .cr-icon-button {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: var(--text);
      font-size: 0;
      position: relative;
    }
    .cr-icon-button:active,
    .cr-model-button:active { background: var(--panel-2); }
    .cr-icon-button::before { content: ""; display: block; }
    .cr-icon-button[data-icon="menu"]::before {
      width: 24px;
      height: 18px;
      background:
        linear-gradient(currentColor, currentColor) 0 0/24px 2.3px no-repeat,
        linear-gradient(currentColor, currentColor) 0 8px/24px 2.3px no-repeat,
        linear-gradient(currentColor, currentColor) 0 16px/24px 2.3px no-repeat;
      border-radius: 2px;
    }
    .cr-icon-button[data-icon="close"]::before { content: "×"; font-size: 30px; line-height: 1; transform: translateY(-1px); }
    .cr-icon-button[data-icon="new"]::before {
      width: 23px;
      height: 23px;
      border: 2px solid currentColor;
      border-radius: 6px;
      clip-path: polygon(0 0, 76% 0, 76% 30%, 100% 30%, 100% 100%, 0 100%);
    }
    .cr-icon-button[data-icon="new"]::after {
      content: "";
      position: absolute;
      width: 16px;
      height: 3px;
      border-radius: 999px;
      background: currentColor;
      transform: rotate(-45deg) translate(4px, -1px);
    }
    .cr-icon-button[data-icon="more"]::before { content: "⋯"; font-size: 27px; line-height: 1; transform: translateY(-5px); }
    .cr-scrim {
      position: fixed;
      inset: 0;
      z-index: 60;
      background: rgba(0, 0, 0, 0.42);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
    }
    body.is-side-open .cr-scrim { opacity: 1; pointer-events: auto; }
    .cr-sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 61;
      width: min(320px, calc(100vw - 54px));
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      background: var(--side);
      border-right: 1px solid var(--line);
      visibility: hidden;
      pointer-events: none;
      transform: translateX(-104%);
      transition: transform 0.22s ease;
    }
    body.is-side-open .cr-sidebar {
      transform: translateX(0);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.42);
      visibility: visible;
      pointer-events: auto;
    }
    .cr-sidebar-top {
      padding: calc(14px + env(safe-area-inset-top, 0px)) 12px 10px;
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
    }
    .cr-search {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 40px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
    }
    .cr-search input { min-width: 0; width: 100%; background: transparent; color: var(--text); }
    .cr-history { overflow-y: auto; padding: 8px 14px 18px; }
    .cr-history h2 { margin: 12px 2px 8px; color: var(--muted); font-size: 13px; font-weight: 700; }
    .cr-history-item {
      width: 100%;
      min-height: 42px;
      padding: 10px 12px;
      border-radius: 12px;
      display: block;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 16px;
    }
    .cr-history-item.is-active,
    .cr-history-item:active { background: var(--panel); }
    .cr-sidebar-footer {
      padding: 10px 14px calc(12px + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid var(--line);
      display: grid;
      gap: 6px;
    }
    .cr-account-row {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 8px;
      border-radius: 12px;
      text-align: left;
    }
    .cr-account-row:active { background: var(--panel); }
    .cr-account-avatar {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--panel);
      font-size: 18px;
    }
    .cr-account-row strong,
    .cr-account-row small { display: block; }
    .cr-account-row small { color: var(--muted); font-size: 13px; margin-top: 1px; }
    .cr-scroll {
      position: fixed;
      left: 0;
      right: 0;
      top: calc(var(--top) + env(safe-area-inset-top, 0px));
      bottom: calc(var(--composer-h) + env(safe-area-inset-bottom, 0px));
      width: 100vw;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: var(--bg);
      padding: 18px 0 24px;
    }
    .cr-messages { width: 100%; }
    .cr-message {
      width: 100%;
      margin: 0 0 22px;
      padding: 0 14px;
      display: flex;
      gap: 12px;
    }
    .cr-message.user { justify-content: flex-end; }
    .cr-message.assistant { justify-content: flex-start; }
    .cr-avatar {
      width: 30px;
      height: 30px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--panel-2);
      border: 1px solid var(--line);
      font-size: 13px;
      font-weight: 700;
      margin-top: 3px;
    }
    .cr-content { min-width: 0; max-width: 100%; }
    .cr-message.user .cr-content { max-width: min(82vw, 620px); display: flex; flex-direction: column; align-items: flex-end; }
    .cr-message.assistant .cr-content { max-width: min(86vw, 760px); padding-right: 18px; }
    .cr-user-bubble {
      background: var(--user);
      padding: 10px 14px;
      border-radius: 20px;
      border-bottom-right-radius: 6px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 15.5px;
    }
    .cr-assistant-text { padding-top: 2px; line-height: 1.72; font-size: 16px; white-space: pre-wrap; overflow-wrap: anywhere; }
    .cr-assistant-text p { margin: 0 0 14px; }
    .cr-assistant-text p:last-child { margin-bottom: 0; }
    .cr-row-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
      margin-left: -4px;
      color: var(--muted);
    }
    .cr-user-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      width: 100%;
      margin-top: 10px;
      padding-right: 1px;
      color: var(--muted);
    }
    .cr-mini-action {
      min-width: 26px;
      width: 26px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      color: var(--muted);
      font-size: 0;
      position: relative;
    }
    .cr-user-actions .cr-mini-action { width: 24px; height: 26px; min-width: 24px; }
    .cr-mini-action:active { background: var(--panel-2); color: var(--text); }
    .cr-mini-action::before { content: ""; width: 18px; height: 18px; display: block; color: currentColor; }
    .cr-mini-action[data-icon="copy"]::before { border: 2px solid currentColor; border-radius: 2px; transform: translate(-2px, 2px); box-shadow: 5px -5px 0 -2px var(--bg), 5px -5px 0 0 currentColor; }
    .cr-mini-action[data-icon="like"]::before { content: "♡"; width: auto; height: auto; font-size: 19px; line-height: 1; transform: translateY(-1px); }
    .cr-mini-action[data-icon="refresh"]::before { content: "↻"; width: auto; height: auto; font-size: 19px; line-height: 1; }
    .cr-mini-action[data-icon="favorite"]::before { content: "☆"; width: auto; height: auto; font-size: 19px; line-height: 1; }
    .cr-mini-action[data-icon="delete"]::before { border: 2px solid currentColor; border-top: 0; border-radius: 0 0 5px 5px; width: 14px; height: 13px; transform: translateY(3px); }
    .cr-mini-action[data-icon="delete"]::after { content: ""; position: absolute; width: 15px; height: 2px; background: currentColor; border-radius: 2px; top: 8px; }
    .cr-mini-action[data-icon="edit"]::before { width: 17px; height: 6px; border-radius: 999px; background: currentColor; transform: rotate(-45deg); }
    .cr-composer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 31;
      width: 100vw;
      height: calc(var(--composer-h) + env(safe-area-inset-bottom, 0px));
      padding: 7px 20px calc(7px + env(safe-area-inset-bottom, 0px));
      background: var(--bg);
      border-top: 1px solid var(--line);
      overflow: hidden;
    }
    .cr-composer-row {
      width: 100%;
      height: var(--pill-h);
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr) 40px;
      grid-template-rows: 1fr;
      gap: 8px;
      align-items: end;
    }
    .cr-image-button {
      grid-column: 1;
      grid-row: 1;
      width: 40px;
      height: 40px;
      align-self: end;
      justify-self: center;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--panel);
      color: #111;
      font-size: 28px;
      font-weight: 300;
      line-height: 1;
    }
    .cr-input-pill {
      grid-column: 2;
      grid-row: 1;
      min-width: 0;
      width: 100%;
      height: var(--pill-h);
      align-self: end;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      align-items: center;
      gap: 2px;
      padding: 4px 7px 4px 15px;
      border-radius: 999px;
      background: var(--panel);
      overflow: hidden;
    }
    .cr-input-pill textarea {
      width: 100%;
      min-width: 0;
      height: var(--input-h);
      min-height: 22px;
      max-height: 88px;
      padding: 0 2px 0 0;
      margin: 0;
      resize: none;
      background: transparent;
      color: #171717;
      line-height: 22px;
      font-size: 16px;
      overflow-y: auto;
      align-self: center;
      scrollbar-width: none;
    }
    .cr-input-pill textarea::-webkit-scrollbar { display: none; }
    .cr-input-pill textarea::placeholder { color: #929292; }
    .cr-send {
      grid-column: 3;
      grid-row: 1;
      width: 40px;
      height: 40px;
      align-self: end;
      justify-self: center;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--call);
      color: #fff;
      font-size: 0;
      position: relative;
      z-index: 3;
    }
    .cr-send::before {
      content: "";
      width: 0;
      height: 0;
      border-top: 7px solid transparent;
      border-bottom: 7px solid transparent;
      border-left: 11px solid #fff;
      transform: translateX(2px);
    }
    .cr-send[data-mode="send"]::before { content: "↑"; border: 0; width: auto; height: auto; transform: none; font-size: 24px; line-height: 1; }
    .cr-popover {
      position: fixed;
      top: calc(var(--top) + env(safe-area-inset-top, 0px) + 6px);
      left: 50%;
      z-index: 140;
      transform: translateX(-50%);
      width: min(330px, calc(100vw - 28px));
    }
    .cr-pop-card {
      display: grid;
      gap: 4px;
      padding: 12px;
      border-radius: 22px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.24);
    }
    .cr-pop-card strong { font-size: 15px; padding: 6px 8px; color: var(--muted); }
    .cr-pop-card button { min-height: 44px; padding: 10px 12px; border-radius: 14px; text-align: left; color: var(--text); }
    .cr-pop-card button:active { background: var(--panel-2); }
    .cr-pop-card hr { width: 100%; border: 0; border-top: 1px solid var(--line); margin: 4px 0; }
    .cr-panel {
      position: fixed;
      inset: 0;
      z-index: 260;
      background: var(--bg);
      color: var(--text);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }
    .cr-panel-head {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      padding: calc(22px + env(safe-area-inset-top, 0px)) 18px 14px;
      background: var(--bg);
    }
    .cr-back {
      width: 46px;
      height: 46px;
      border-radius: 999px;
      background: var(--panel);
      display: grid;
      place-items: center;
      font-size: 30px;
      line-height: 1;
    }
    .cr-panel-head h1 { margin: 0; font-size: 23px; letter-spacing: -0.04em; font-weight: 650; }
    .cr-panel-head p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
    .cr-panel-body { overflow: auto; -webkit-overflow-scrolling: touch; padding: 14px 18px calc(32px + env(safe-area-inset-bottom, 0px)); }
    .cr-group { margin: 0 0 26px; }
    .cr-group h2 { margin: 0 0 10px; color: var(--muted); font-size: 18px; font-weight: 550; }
    .cr-card { overflow: hidden; border-radius: 22px; background: var(--panel); border: 1px solid var(--line); margin-bottom: 18px; }
    .cr-card.loose { padding: 16px 18px; line-height: 1.58; color: var(--muted); }
    .cr-card.loose h2 { margin: 0 0 8px; color: var(--text); font-size: 20px; letter-spacing: -0.03em; }
    .cr-card.loose p { margin: 0 0 10px; }
    .cr-list-button,
    .cr-list-row {
      width: 100%;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 15px 18px;
      text-align: left;
      border-bottom: 1px solid var(--line);
      background: transparent;
      color: var(--text);
    }
    .cr-list-button:last-child,
    .cr-list-row:last-child { border-bottom: 0; }
    .cr-list-button:active { background: var(--panel-2); }
    .cr-list-button strong,
    .cr-list-row strong { display: block; font-size: 19px; font-weight: 520; letter-spacing: -0.03em; }
    .cr-list-button small,
    .cr-list-row small { display: block; margin-top: 4px; color: var(--muted); font-size: 13px; line-height: 1.35; }
    .cr-entry-grid { display: grid; gap: 10px; }
    .cr-entry-grid button {
      min-height: 76px;
      padding: 15px 16px;
      border-radius: 22px;
      background: var(--panel);
      border: 1px solid var(--line);
      text-align: left;
      font-size: 19px;
      font-weight: 520;
      letter-spacing: -0.03em;
    }
    .cr-entry-grid small { display: block; margin-top: 6px; color: var(--muted); font-size: 13px; font-weight: 400; letter-spacing: 0; }
    .cr-form { display: grid; gap: 14px; }
    .cr-form label { display: grid; gap: 8px; color: var(--muted); font-size: 14px; }
    .cr-form input,
    .cr-form textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      color: var(--text);
      padding: 13px 14px;
      outline: 0;
      resize: vertical;
    }
    .cr-note { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .cr-inventory { padding: 0; margin: 0; list-style: none; }
    .cr-inventory li { padding: 12px 0; border-bottom: 1px solid var(--line); }
    .cr-inventory li:last-child { border-bottom: 0; }
    .cr-inventory b { display: block; color: var(--text); font-weight: 560; }
    .cr-inventory span { display: block; color: var(--muted); font-size: 12.5px; line-height: 1.45; margin-top: 4px; }
  </style>
</head>
<body>
  <div id="cleanroomApp" class="cr-shell" data-stage="P3-CLEANROOM-00" data-staging="temporary">
    <div id="cleanroomScrim" class="cr-scrim" data-inventory-id="sidebar.scrim"></div>
    <aside id="cleanroomSidebar" class="cr-sidebar" aria-label="聊天历史">
      <div class="cr-sidebar-top">
        <button class="cr-icon-button" type="button" aria-label="关闭侧边栏" data-icon="close" data-route="close-sidebar" data-inventory-id="sidebar.close"></button>
        <label class="cr-search"><span aria-hidden="true">⌕</span><input type="search" placeholder="搜索聊天" autocomplete="off" /></label>
      </div>
      <nav class="cr-history" aria-label="最近聊天">
        <section>
          <h2>已保存</h2>
          <button class="cr-history-item is-active" type="button" data-route="chat" data-inventory-id="sidebar.test-window">测试窗口</button>
          <button class="cr-history-item" type="button" data-route="daily" data-inventory-id="sidebar.daily">海岸日报</button>
        </section>
      </nav>
      <div class="cr-sidebar-footer">
        <button type="button" class="cr-account-row" data-route="theme" data-inventory-id="sidebar.theme"><span class="cr-account-avatar">◐</span><span><strong>主题</strong><small>浅色 · 静态占位</small></span></button>
        <button type="button" class="cr-account-row" data-route="wolf" data-inventory-id="sidebar.wolf"><span class="cr-account-avatar">🐺</span><span><strong>Wolf Den</strong><small>小狼窝入口</small></span></button>
        <button type="button" class="cr-account-row" data-route="desk" data-inventory-id="sidebar.desk"><span class="cr-account-avatar">⌁</span><span><strong>Serpent Desk</strong><small>小蛇书桌</small></span></button>
      </div>
    </aside>
    <main class="cr-main">
      <header class="cr-topbar">
        <button class="cr-icon-button" type="button" aria-label="打开侧边栏" data-icon="menu" data-route="open-sidebar" data-inventory-id="topbar.menu"></button>
        <button class="cr-model-button" type="button" aria-label="选择模型" data-route="model-picker" data-inventory-id="topbar.model"><span class="cr-model-title">ChatGPT</span><span class="cr-model-name">5.5 Thinking ›</span></button>
        <div class="cr-actions">
          <button class="cr-icon-button" type="button" aria-label="新建聊天" data-icon="new" data-route="chat" data-inventory-id="topbar.new-chat"></button>
          <button class="cr-icon-button" type="button" aria-label="更多" data-icon="more" data-route="inventory" data-inventory-id="topbar.more"></button>
        </div>
      </header>
      <section class="cr-scroll" aria-label="聊天消息">
        <div class="cr-messages">
          <article class="cr-message assistant">
            <div class="cr-avatar">⌁</div>
            <div class="cr-content">
              <div class="cr-assistant-text"><p>这里是 P3-CLEANROOM-00 的静态验收壳。它只冻结当前正式海岸 UI 的结构、尺寸、按钮位置与视觉层级，不接真实生成，不接密钥，不移动旧正文语义。</p><p>旧前端只作为视觉参考和功能清单；这个页面以后通过 clean logic reconnect 接回正式功能。</p></div>
              <div class="cr-row-actions">
                <button class="cr-mini-action" type="button" aria-label="复制" data-icon="copy" data-route="stub" data-inventory-id="message.assistant.copy"></button>
                <button class="cr-mini-action" type="button" aria-label="点赞" data-icon="like" data-route="stub" data-inventory-id="message.assistant.like"></button>
                <button class="cr-mini-action" type="button" aria-label="重新生成" data-icon="refresh" data-route="stub" data-inventory-id="message.assistant.refresh"></button>
                <button class="cr-mini-action" type="button" aria-label="收藏" data-icon="favorite" data-route="stub" data-inventory-id="message.assistant.favorite"></button>
                <button class="cr-mini-action" type="button" aria-label="删除" data-icon="delete" data-route="stub" data-inventory-id="message.assistant.delete"></button>
              </div>
            </div>
          </article>
          <article class="cr-message user">
            <div class="cr-content">
              <div class="cr-user-bubble">clean-room rebuild：第一阶段只做 UI freeze and static shell。</div>
              <div class="cr-user-actions">

          'desk-note': ['桌面便签', 'Future: CleanWorkspace.openNote', formBlock('便签', '静态便签，不保存。', 8)],
          'desk-work': ['施工状态', 'Future: CleanDiagnostics.openWorkStatus', group('施工', line('阶段', 'P3-CLEANROOM-00') + line('目标', 'UI freeze and static shell') + line('边界', '不接 API，不改正式入口'))],
          'desk-diag': ['本地诊断', 'Future: CleanDiagnostics.openRuntimeStatus', group('诊断', line('页面', 'cleanroom.html') + line('真实功能', '未接入') + line('写入行为', '无'))],
          'desk-system': ['System Prompt 草稿', 'Future: CleanWorkspace.openSystemDraft', formBlock('草稿', '静态草稿，不发送不生效。', 9)],
          'daily-child-widgets': ['小组件', 'Daily child · static shell', card('小组件', '<p>这个入口还没有独立 clean module，先固定门牌与返回路径。</p>')],
          'daily-child-pet': ['宠物系统', 'Daily child · static shell', card('宠物系统', '<p>这个入口还没有独立 clean module，先固定门牌与返回路径。</p>')],
          'stub': ['静态占位', 'No runtime behavior in phase 1', card('暂不接功能', '<p>这个按钮已经登记在 inventory，下一阶段再接对应 clean logic。</p>')]
        };
        const next = detailMap[route] || detailMap.stub;
        openPanel(next[0], next[1], next[2], route);
      }

      function routeTo(route) {
        if (route === 'open-sidebar') { openSide(); return; }
        if (route === 'close-sidebar') { closeSide(); return; }
        if (route === 'model-picker') { showPicker(); return; }
        if (route === 'back') {
          const last = state.stack.pop();
          if (!last || last === 'chat') { closePanel(); return; }
          closePanel();
          routeTo(last);
          return;
        }
        hidePicker();
        closeSide();
        if (route === 'chat') { closePanel(); return; }
        if (route === 'wolf') { openWolf(); return; }
        if (route === 'desk') { openDesk(); return; }
        if (route === 'daily') { openDaily(); return; }
        if (route === 'moments') { openMoments(); return; }
        if (route === 'moments-compose') { openMomentsCompose(); return; }
        if (route === 'diary') { openDiary(); return; }
        if (route === 'diary-compose') { openDiaryCompose(); return; }
        if (route === 'album') { openAlbum(); return; }
        if (route === 'album-compose') { openAlbumCompose(); return; }
        if (route === 'theme') { openTheme(); return; }
        if (route === 'inventory') { openInventory(); return; }
        openDetail(route);
      }

      document.addEventListener('click', (event) => {
        const hit = event.target.closest('[data-route], #cleanroomScrim');
        if (!hit) return;
        event.preventDefault();
        if (hit.id === 'cleanroomScrim') { closeSide(); return; }
        routeTo(hit.dataset.route);
      });

      $('.cr-composer').addEventListener('submit', (event) => {
        event.preventDefault();
        routeTo('stub');
      });

      $$('.cr-input-pill textarea').forEach((textarea) => {
        textarea.addEventListener('input', () => {
          const send = $('.cr-send');
          send.dataset.mode = textarea.value.trim() ? 'send' : 'call';
        });
      });
    })();
  </script>
</body>
</html>
