<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ChatGPT" />
  <title>ChatGPT</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/public/styles.css" />
</head>
<body>
  <div id="app" class="chatgpt-shell">
    <div id="scrim" class="scrim" hidden></div>
    <aside id="sidebar" class="sidebar" aria-label="聊天历史">
      <div class="sidebar-top">
        <button id="sidebarClose" class="icon-button" type="button" aria-label="关闭侧边栏" data-icon="close"></button>
        <label class="sidebar-search"><span data-icon="search"></span><input type="search" placeholder="搜索聊天" autocomplete="off" /></label>
      </div>
      <nav class="history-list" aria-label="最近聊天">
        <section><h2>已保存</h2><button id="testWindowButton" class="history-item is-active" type="button">测试窗口</button></section>
      </nav>
      <div class="sidebar-footer">
        <button type="button" class="account-row" id="themeToggle"><span class="account-avatar" data-icon="theme"></span><span><strong>主题</strong><small id="theme-label">浅色</small></span></button>
        <button type="button" class="account-row"><span class="account-avatar">?</span><span><strong>帮助</strong><small>本地预览界面</small></span></button>
      </div>
    </aside>
    <main class="main-panel">
      <header class="topbar">
        <button id="menuButton" class="icon-button" type="button" aria-label="打开侧边栏" data-icon="menu"></button>
        <button id="modelButton" class="model-button" type="button" aria-label="选择模型"><span class="model-title">ChatGPT</span><span class="model-name">5.5 Thinking ›</span></button>
        <div class="topbar-actions"><button id="newChatButton" class="icon-button" type="button" aria-label="新建聊天" data-icon="new-chat"></button><button id="moreButton" class="icon-button" type="button" aria-label="更多" data-icon="more"></button></div>
      </header>
      <section id="messageScroller" class="message-scroller" aria-label="聊天消息"><div id="messages" class="messages"></div></section>
      <form id="composer" class="composer-wrap" autocomplete="off">
        <div class="composer-line"></div>
        <div class="composer-row">
          <button id="imageButton" class="image-button" type="button" aria-label="上传图片" data-icon="image"></button>
          <div class="input-pill">
            <textarea id="promptInput" rows="1" placeholder="询问任何问题" aria-label="询问任何问题"></textarea>
            <button id="micButton" class="mic-button" type="button" aria-label="语音输入" data-icon="mic"></button>
            <button id="sendButton" class="mic-button send-inline" type="submit" aria-label="发送" data-icon="send" hidden></button>
            <button id="stopButton" class="mic-button send-inline" type="button" aria-label="停止生成" data-icon="stop" hidden></button>
          </div>
          <button id="callButton" class="call-button" type="button" aria-label="通话" data-icon="call"></button>
        </div>
      </form>
    </main>
  </div>
  <script src="/public/app.js" defer></script>
  <script>
(() => {
  if (window.__elementeraRunControlP301B) return;
  window.__elementeraRunControlP301B = true;

  const storageKey = 'elementera.runControlSettings';
  const apiTempContextKeys = [
    'elementera.api.tempContext',
    'elementera.api.currentScratchpad',
    'elementera.api.recentContextDraft'
  ];

  const defaultRunControlSettings = {
    modelPreset: 'daily_chat',
    contextMode: 'balanced',
    recentTurns: 8,
    contextBudget: 6000,
    outputLength: 'normal',
    creativity: 'natural',
    memoryRecall: 'low',
    seedRecallLimit: 3,
    scratchpadBudget: 800
  };

  // 后续真正发给模型时，拼装优先级是：
  // 1. 极短屋规 / 登岛信核心。
  // 2. 当前小纸条。
  // 3. 最近原文上下文，从新到旧塞到预算上限。
  // 4. 仅在需要时低频放 1-3 粒种子。
  // 5. 当前用户输入。
  // 预算不够时：
  // 1. 先裁最旧原文上下文。
  // 2. 再裁种子召回。
  // 3. 再压缩小纸条。
  // 4. 不得裁当前用户输入。

  const choices = {
    modelPreset: [['cheap_test', '便宜测试'], ['daily_chat', '日常聊天'], ['deep_work', '深度整理']],
    contextMode: [['short', '短'], ['balanced', '平衡'], ['deep', '深']],
    recentTurns: [[2, '2'], [4, '4'], [8, '8'], [12, '12']],
    contextBudget: [[2000, '低 · 2000'], [6000, '中 · 6000'], [12000, '高 · 12000']],
    outputLength: [['short', '短回'], ['normal', '正常'], ['long', '长信']],
    creativity: [['stable', '稳一点'], ['natural', '自然'], ['expansive', '发散一点']],
    memoryRecall: [['off', '关'], ['low', '低'], ['medium', '中']]
  };
  const numericFields = new Set(['recentTurns', 'contextBudget', 'seedRecallLimit', 'scratchpadBudget']);
  const q = (selector, root = document) => root.querySelector(selector);
  const qa = (selector, root = document) => Array.from(root.querySelectorAll(selector));
  const esc = (value) => String(value ?? '').replace(/[&<>]/g, (char) => ({'&': '&amp;', '<': '&lt;', '>': '&gt;'}[char]));

  function clamp(value, min, max, fallback) {
    const num = Number(value);
    if (!Number.isFinite(num)) return fallback;
    return Math.min(Math.max(num, min), max);
  }

  function normalizeSettings(settings) {
    const next = {...defaultRunControlSettings, ...(settings || {})};
    for (const [name, list] of Object.entries(choices)) {
      const allowed = list.map((item) => item[0]);
      if (numericFields.has(name)) next[name] = Number(next[name]);
      if (!allowed.includes(next[name])) next[name] = defaultRunControlSettings[name];
    }
    next.seedRecallLimit = clamp(next.seedRecallLimit, 0, 6, defaultRunControlSettings.seedRecallLimit);
    next.scratchpadBudget = clamp(next.scratchpadBudget, 0, 2400, defaultRunControlSettings.scratchpadBudget);
    return next;
  }

  function getSettings() {
    try {
      const raw = localStorage.getItem(storageKey);
      return normalizeSettings(raw ? JSON.parse(raw) : defaultRunControlSettings);
    } catch (_) {
      return {...defaultRunControlSettings};
    }
  }

  function setSettings(partial) {
    const next = normalizeSettings({...getSettings(), ...(partial || {})});
    localStorage.setItem(storageKey, JSON.stringify(next));
    renderPanel(q('#runControlPanelP301B')?.dataset.source || 'wolf');
    return next;
  }

  window.elementeraRunControl = {
    getSettings,
    setSettings,
    defaultRunControlSettings,
    storageKey
  };

  function installStyles() {
    if (q('#runControlStyleP301B')) return;
    const style = document.createElement('style');
    style.id = 'runControlStyleP301B';
    style.textContent = `
      .run-control-entry-p301b small{line-height:1.35}.run-control-p301b .clean-body{padding-bottom:calc(42px + env(safe-area-inset-bottom,0px))}.run-control-status-p301b{margin:0 0 16px;color:var(--muted);font-size:13px;line-height:1.55}.run-control-field{display:block;padding:15px 16px;border-bottom:1px solid var(--line)}.run-control-field:last-child{border-bottom:0}.run-control-field legend,.run-control-label{display:block;margin:0 0 10px;color:var(--text);font-size:18px;font-weight:520;letter-spacing:-.03em}.run-control-note{margin:8px 0 0;color:var(--muted);font-size:13px;line-height:1.55}.run-control-options{display:flex;flex-wrap:wrap;gap:8px}.run-control-choice{display:inline-flex;align-items:center}.run-control-choice input{position:absolute;opacity:0;pointer-events:none}.run-control-choice span{display:inline-flex;align-items:center;min-height:38px;padding:8px 12px;border:1px solid var(--line);border-radius:999px;background:var(--bg);color:var(--muted);font-size:14px}.run-control-choice input:checked+span{border-color:var(--call);color:var(--text);box-shadow:0 0 0 1px color-mix(in srgb,var(--call) 35%,transparent)}.run-control-number{display:grid;gap:9px;padding:15px 16px;border-bottom:1px solid var(--line)}.run-control-number input{width:100%;border:1px solid var(--line);border-radius:18px;background:var(--bg);color:var(--text);padding:13px 14px;outline:0}.run-control-clear-card{display:grid}.run-control-clear-card button{min-height:58px;padding:15px 18px;border-bottom:1px solid var(--line);text-align:left;color:var(--text)}.run-control-clear-card button:last-child{border-bottom:0}.run-control-clear-card button small{display:block;margin-top:4px;color:var(--muted);font-size:13px}.run-control-clear-card button:disabled{opacity:.56;cursor:not-allowed}.run-control-danger{color:#d66a53!important}@media(max-width:720px){.run-control-choice span{border-radius:13px}.run-control-options{gap:7px}.run-control-clear-card button{min-height:64px}}`;
    document.head.appendChild(style);
  }

  function choiceField(title, name, note = '') {
    const settings = getSettings();
    return `<fieldset class="run-control-field"><legend>${esc(title)}</legend><div class="run-control-options">${choices[name].map(([value, label]) => `<label class="run-control-choice"><input type="radio" name="${name}" value="${esc(value)}" ${settings[name] === value ? 'checked' : ''}><span>${esc(label)}</span></label>`).join('')}</div>${note ? `<p class="run-control-note">${esc(note)}</p>` : ''}</fieldset>`;
  }

  function numberField(title, name, min, max, step, note) {
    const settings = getSettings();
    return `<label class="run-control-number"><span class="run-control-label">${esc(title)}</span><input type="number" name="${name}" min="${min}" max="${max}" step="${step}" inputmode="numeric" value="${esc(settings[name])}">${note ? `<small class="run-control-note">${esc(note)}</small>` : ''}</label>`;
  }

  function group(title, body) {
    return `<section class="clean-group"><h2>${esc(title)}</h2><div class="clean-card">${body}</div></section>`;
  }

  function panelHtml(source) {
    return `<header class="clean-head"><button class="clean-back" type="button" data-run-control-back>←</button><div><h1>API 小屋运行控制层</h1><p>Local settings · Context · Token budget</p></div></header><main class="clean-body"><p id="runControlStatusP301B" class="run-control-status-p301b">设置会保存到 localStorage：${storageKey}</p>${group('常用水闸', choiceField('模型档位', 'modelPreset') + choiceField('上下文模式', 'contextMode') + choiceField('输出长度', 'outputLength') + choiceField('记忆召回强度', 'memoryRecall', '预留，不召回真实记忆。未来种子库默认沉睡，只在高度相关时偶尔唤醒。'))}${group('高级预算', choiceField('最近上下文轮数', 'recentTurns') + choiceField('上下文 token 预算', 'contextBudget', '这是预算值，当前不做精确 tokenizer 计算。') + choiceField('创造性 / 稳定性', 'creativity') + numberField('小纸条预算 · 预留', 'scratchpadBudget', 0, 2400, 100, '当前只保存预算，不生成小纸条。') + numberField('种子召回数量 · 预留', 'seedRecallLimit', 0, 6, 1, '当前只保存数量，不召回真实种子。'))}<section class="clean-group"><h2>清理</h2><div class="clean-card run-control-clear-card"><button type="button" class="run-control-danger" data-clear-api-temp-context><strong>清空 API 临时上下文</strong><small>只清未来请求层预留 key，不碰现有聊天记录。</small></button><button type="button" disabled><strong>清空当前小纸条 · 暂未接入</strong><small>预留按钮，当前不执行。</small></button><button type="button" disabled><strong>清空待确认袋 · 暂未接入</strong><small>预留按钮，当前不执行。</small></button></div></section></main>`;
  }

  function renderPanel(source) {
    installStyles();
    let panel = q('#runControlPanelP301B');
    if (!panel) {
      panel = document.createElement('section');
      panel.id = 'runControlPanelP301B';
      panel.className = 'clean-panel run-control-p301b';
      document.body.appendChild(panel);
    }
    panel.dataset.source = source || panel.dataset.source || 'wolf';
    panel.hidden = false;
    panel.innerHTML = panelHtml(panel.dataset.source);
    q('#cleanWolfV093')?.setAttribute('hidden', '');
    q('#cleanDeskV093')?.setAttribute('hidden', '');
    document.body.classList.add('wolf-open');
    return panel;
  }

  function closePanel() {
    const panel = q('#runControlPanelP301B');
    const source = panel?.dataset.source || 'wolf';
    if (panel) panel.hidden = true;
    const parent = source === 'desk' ? q('#cleanDeskV093') : q('#cleanWolfV093');
    if (parent) {
      parent.hidden = false;
      document.body.classList.add('wolf-open');
    }
  }

  function ensureEntrance(panelId, groupTitle, title, subtitle, source) {
    const panel = q(panelId);
    if (!panel || q(`[data-run-control-source="${source}"]`, panel)) return;
    const groups = qa('.clean-group', panel);
    const target = groups.find((item) => (q('h2', item)?.textContent || '').includes(groupTitle));
    const card = target && q('.clean-card', target);
    if (!card) return;
    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'clean-row run-control-entry-p301b';
    button.dataset.runControlSource = source;
    button.innerHTML = `<span><strong>${esc(title)}</strong><small>${esc(subtitle)}</small></span>`;
    card.appendChild(button);
  }

  function ensureEntrances() {
    installStyles();
    ensureEntrance('#cleanWolfV093', '账户', 'API 小屋设置', '模型、上下文、token、输出', 'wolf');
    ensureEntrance('#cleanDeskV093', '施工', '运行水闸', '请求预算、召回预留、清理', 'desk');
  }

  function saveFromPanel(panel) {
    const next = {...getSettings()};
    const data = new FormData(panel);
    data.forEach((value, name) => {
      next[name] = numericFields.has(name) ? Number(value) : String(value);
    });
    setSettings(next);
    const status = q('#runControlStatusP301B');
    if (status) status.textContent = `已保存到 localStorage：${storageKey}`;
  }

  function clearApiTempContext() {
    const ok = confirm('确定清空 API 临时上下文吗？这不会清空现有聊天记录。');
    if (!ok) return;
    apiTempContextKeys.forEach((key) => localStorage.removeItem(key));
    window.dispatchEvent(new CustomEvent('elementera:api-temp-context-cleared'));
    const status = q('#runControlStatusP301B');
    if (status) status.textContent = 'API 临时上下文已清空；聊天记录未被触碰。';
  }

  document.addEventListener('click', (event) => {
    const entry = event.target.closest('[data-run-control-source]');
    if (entry) {
      event.preventDefault();
      event.stopPropagation();
      renderPanel(entry.dataset.runControlSource || 'wolf');
      return;
    }
    if (event.target.closest('[data-run-control-back]')) {
      event.preventDefault();
      event.stopPropagation();
      closePanel();
      return;
    }
    if (event.target.closest('[data-clear-api-temp-context]')) {
      event.preventDefault();
      event.stopPropagation();
      clearApiTempContext();
    }
  }, true);

  document.addEventListener('change', (event) => {
    const panel = event.target.closest('#runControlPanelP301B');
    if (panel) saveFromPanel(panel);
  }, true);

  document.addEventListener('input', (event) => {
    const panel = event.target.closest('#runControlPanelP301B');
    if (panel && event.target.type === 'number') saveFromPanel(panel);
  }, true);

  const observer = new MutationObserver(ensureEntrances);
  const start = () => {
    installStyles();
    ensureEntrances();
    observer.observe(document.body, {childList: true, subtree: true});
    localStorage.setItem(storageKey, JSON.stringify(getSettings()));
  };
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start);
  else start();
})();
  </script>
</body>
</html>
